<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Add New Employee</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#334155",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-primary": "#60a5fa",
                        "on-secondary-fixed": "#064e3b",
                        "surface-container-high": "#1e293b99",
                        "on-tertiary-fixed": "#78350f",
                        "surface-bright": "#1e293b",
                        "secondary": "#10b981",
                        "secondary-container": "#10b9811a",
                        "on-error-container": "#fecaca",
                        "surface-dim": "#101822",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#f1f5f9",
                        "surface-container-lowest": "#0b1018",
                        "on-background": "#f1f5f9",
                        "tertiary-fixed": "#fef3c7",
                        "surface": "#101822",
                        "secondary-fixed-dim": "#a7f3d0",
                        "on-tertiary-container": "#f59e0b",
                        "on-surface": "#f1f5f9",
                        "tertiary-fixed-dim": "#fde68a",
                        "surface-tint": "#136dec",
                        "secondary-fixed": "#d1fae5",
                        "outline": "#334155",
                        "surface-container-low": "#1e293b66",
                        "tertiary-container": "#f59e0b1a",
                        "primary-fixed": "#dbeafe",
                        "on-primary-fixed": "#1e3a8a",
                        "surface-variant": "#1e293b",
                        "outline-variant": "#475569",
                        "on-secondary-fixed-variant": "#047857",
                        "primary-fixed-dim": "#bfdbfe",
                        "surface-container": "#1e293b80",
                        "primary": "#136dec",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#ffffff",
                        "inverse-on-surface": "#0f172a",
                        "primary-container": "#136dec",
                        "error-container": "#450a0a",
                        "background": "#101822",
                        "on-tertiary-fixed-variant": "#b45309",
                        "on-primary-fixed-variant": "#1d4ed8",
                        "on-surface-variant": "#94a3b8",
                        "tertiary": "#f59e0b",
                        "error": "#ef4444",
                        "on-secondary-container": "#10b981"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .inner-shadow-field {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.4);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen pb-32">
    <!-- TopAppBar Shell -->
    <header
        class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-slate-900/80 backdrop-blur-md shadow-sm">
        <div class="flex items-center gap-4">
            <button
                class="p-2 text-slate-400 hover:bg-slate-800/50 transition-colors active:scale-[0.98] transition-transform rounded-full">
                <a href="{% url 'xodimlar_page' %}"><span class="material-symbols-outlined">arrow_back</span></a>
            </button>
            <h1 class="font-manrope font-bold text-lg text-slate-100">Add New Employee</h1>
        </div>
        
    </header>
    <main class="pt-24 px-6 max-w-2xl mx-auto flex flex-col gap-8">
        <!-- Profile Image Upload Area -->
        <form method="post">
            {% csrf_token %}
        <section class="flex flex-col items-center gap-4">
            <div class="relative group">
                <div
                    class="w-32 h-32 rounded-xl bg-surface-container-low flex items-center justify-center border-2 border-dashed border-outline-variant overflow-hidden group-hover:border-primary transition-colors">
                    <span
                        class="material-symbols-outlined text-4xl text-outline-variant group-hover:text-primary">person_add</span>
                </div>
                <button
                    class="absolute bottom-[-8px] right-[-8px] bg-primary text-white p-2 rounded-full shadow-lg shadow-primary/30 active:scale-[0.95] transition-all">
                    <span class="material-symbols-outlined text-sm"
                        style="font-variation-settings: 'FILL' 1;">photo_camera</span>
                </button>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase font-bold tracking-wider text-slate-400">Employee Photo</p>
                <p class="text-xs text-on-surface-variant mt-1">PNG or JPG, max 5MB</p>
            </div>
        </section>
        <!-- Form Fields -->
        <div class="flex flex-col gap-6">
            <!-- Full Name Field -->
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase font-bold tracking-wider text-primary px-1">First Name</label>
                <div
                    class="relative bg-slate-900/50 inner-shadow-field rounded-2xl flex items-center px-4 py-3 border border-transparent focus-within:border-primary/50 transition-all">
                    <span class="material-symbols-outlined text-slate-500 mr-3">badge</span>
                    <input
                        class="bg-transparent border-none focus:ring-0 text-on-surface w-full placeholder:text-slate-600 font-medium"
                        placeholder="e.g. Alisher" type="text" name="first_name"/>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase font-bold tracking-wider text-primary px-1">Last Name</label>
                <div
                    class="relative bg-slate-900/50 inner-shadow-field rounded-2xl flex items-center px-4 py-3 border border-transparent focus-within:border-primary/50 transition-all">
                    <span class="material-symbols-outlined text-slate-500 mr-3">badge</span>
                    <input
                        class="bg-transparent border-none focus:ring-0 text-on-surface w-full placeholder:text-slate-600 font-medium"
                        placeholder="e.g. Uzoqov" type="text" name="last_name"/>
                </div>
            </div>
            <!-- Phone Number Field -->
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase font-bold tracking-wider text-primary px-1">Phone Number</label>
                <div
                    class="relative bg-slate-900/50 inner-shadow-field rounded-2xl flex items-center px-4 py-3 border border-transparent focus-within:border-primary/50 transition-all">
                    <span class="material-symbols-outlined text-slate-500 mr-3">call</span>
                    <input
                        class="bg-transparent border-none focus:ring-0 text-on-surface w-full placeholder:text-slate-600 font-medium"
                        placeholder="+998 90 123 45 67" type="tel" name="phone_number" />
                </div>
            </div>
            <!-- Password Field -->
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase font-bold tracking-wider text-primary px-1">Initial Password</label>
                <div
                    class="relative bg-slate-900/50 inner-shadow-field rounded-2xl flex items-center px-4 py-3 border border-transparent focus-within:border-primary/50 transition-all">
                    <span class="material-symbols-outlined text-slate-500 mr-3">lock</span>
                    <input
                        class="bg-transparent border-none focus:ring-0 text-on-surface w-full placeholder:text-slate-600 font-medium"
                        placeholder="••••••••" type="password" name="password" />
                    <button class="text-slate-500 hover:text-slate-300" type="button">
                        <span class="material-symbols-outlined">visibility</span>
                    </button>
                </div>
            </div>
            <!-- Role Selection -->
            <div class="flex flex-col gap-4">
                <label class="text-[10px] uppercase font-bold tracking-wider text-primary px-1">Assigned Role</label>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <!-- Admin Card -->
                    <label class="relative cursor-pointer group">
                        <input class="peer sr-only" name="role" type="radio" value="ADMIN" />
                        <div
                            class="p-4 rounded-2xl bg-surface-container-low border border-slate-800/50 peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex flex-col items-center gap-2">
                            <span
                                class="material-symbols-outlined text-slate-500 peer-checked:text-primary group-hover:scale-110 transition-transform">admin_panel_settings</span>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Admin</span>
                        </div>
                    </label>
                    <!-- Seller Card -->
                    <label class="relative cursor-pointer group">
                        <input checked="" class="peer sr-only" name="role" type="radio" value="SELLER" />
                        <div
                            class="p-4 rounded-2xl bg-surface-container-low border border-slate-800/50 peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex flex-col items-center gap-2">
                            <span
                                class="material-symbols-outlined text-slate-500 peer-checked:text-primary group-hover:scale-110 transition-transform">point_of_sale</span>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Seller</span>
                        </div>
                    </label>
                    <!-- Manager Card -->
                    <label class="relative cursor-pointer group">
                        <input class="peer sr-only" name="role" type="radio" value="MANAGER" />
                        <div
                            class="p-4 rounded-2xl bg-surface-container-low border border-slate-800/50 peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex flex-col items-center gap-2">
                            <span
                                class="material-symbols-outlined text-slate-500 peer-checked:text-primary group-hover:scale-110 transition-transform">manage_accounts</span>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Manager</span>
                        </div>
                    </label>
                </div>
            </div>
        </div>
        
    </main>
    <!-- Bottom Action Area -->
    <div
        class="fixed bottom-0 w-full z-50 bg-slate-900/90 backdrop-blur-xl border-t border-slate-800/50 px-6 pb-8 pt-4">
        <button
            class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-lg shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">save</span>
            Saqlash
        </button>
    </div>
    </form>
</body>

</html>
