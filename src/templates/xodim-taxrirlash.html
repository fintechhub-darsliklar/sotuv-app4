<!DOCTYPE html>

<html class="dark" lang="uz">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Xodimni tahrirlash - Anvar Karimov</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-highest": "#334155",
            "on-primary": "#ffffff",
            "on-error": "#ffffff",
            "inverse-primary": "#60a5fa",
            "on-secondary-fixed": "#064e3b",
            "surface-container-high": "#1e293b99",
            "on-tertiary-fixed": "#78350f",
            "surface-bright": "#1e293b",
            "secondary": "#10b981",
            "secondary-container": "#10b9811a",
            "on-error-container": "#fecaca",
            "surface-dim": "#101822",
            "on-secondary": "#ffffff",
            "inverse-surface": "#f1f5f9",
            "surface-container-lowest": "#0b1018",
            "on-background": "#f1f5f9",
            "tertiary-fixed": "#fef3c7",
            "surface": "#101822",
            "secondary-fixed-dim": "#a7f3d0",
            "on-tertiary-container": "#f59e0b",
            "on-surface": "#f1f5f9",
            "tertiary-fixed-dim": "#fde68a",
            "surface-tint": "#136dec",
            "secondary-fixed": "#d1fae5",
            "outline": "#334155",
            "surface-container-low": "#1e293b66",
            "tertiary-container": "#f59e0b1a",
            "primary-fixed": "#dbeafe",
            "on-primary-fixed": "#1e3a8a",
            "surface-variant": "#1e293b",
            "outline-variant": "#475569",
            "on-secondary-fixed-variant": "#047857",
            "primary-fixed-dim": "#bfdbfe",
            "surface-container": "#1e293b80",
            "primary": "#136dec",
            "on-tertiary": "#ffffff",
            "on-primary-container": "#ffffff",
            "inverse-on-surface": "#0f172a",
            "primary-container": "#136dec",
            "error-container": "#450a0a",
            "background": "#101822",
            "on-tertiary-fixed-variant": "#b45309",
            "on-primary-fixed-variant": "#1d4ed8",
            "on-surface-variant": "#94a3b8",
            "tertiary": "#f59e0b",
            "error": "#ef4444",
            "on-secondary-container": "#10b981"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .inner-shadow-field {
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.3);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background text-on-background font-body min-h-screen pb-32">
  <!-- TopAppBar -->
  <header
    class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-slate-900/80 backdrop-blur-md shadow-sm">
    <div class="flex items-center gap-4">
      <button class="text-slate-400 hover:bg-slate-800/50 p-2 rounded-full transition-colors active:scale-[0.98]">
        <a href="{% url 'xodimlar_page' %}"><span class="material-symbols-outlined">arrow_back</span></a>
      </button>
      <h1 class="font-manrope font-bold text-lg text-slate-100">Employee Management</h1>
    </div>
  </header>
  <main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">
    <!-- Profile Header Section (Asymmetric Layout) -->
    <section class="flex flex-col md:flex-row items-center gap-6 mb-10">
      <div class="relative group">
        <div class="w-24 h-24 rounded-3xl overflow-hidden shadow-2xl border-2 border-primary/20 bg-surface-container">
          {% if xodim.avatar %}
          <img class="w-full h-full object-cover"
            data-alt="Professional headshot of a middle-aged Central Asian man with a friendly expression and short dark hair in high-key studio lighting"
            src="{{xodim.avatar.url}}" />
          {% else %}
            <img class="w-full h-full object-cover"
            data-alt="Professional headshot of a middle-aged Central Asian man with a friendly expression and short dark hair in high-key studio lighting"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcyQ-SSmYhKJXzCSFvNGqvqBWfOieBWlctP-z5nAyi3fKqIgxMnu30DidxZjtTUZUXmcmxjfBNETyiPQ9Cckwai4gECtwUfAR074if6xZOnKL2S9gxae2x3zVCIVTT28wrH73sOGMomiDRWYUAM_GfVCRyUFBaRPDRmEqF6kg0SxMSzHztd29TL1oUu8FhAR9SFaIf0TY6U1Sr8-xsDZVcAYVoGJ0QMMxTPyBb8DwedZ4lhPzw22mcdHUhzKItoDWkE4YXwaFaWaw" />
          {% endif %}

        </div>
        <button
          class="absolute -bottom-2 -right-2 bg-primary text-white p-2 rounded-xl shadow-lg active:scale-90 transition-transform">
          <span class="material-symbols-outlined text-sm">edit</span>
        </button>
      </div>
      <div class="text-center md:text-left space-y-1">
        <h2 class="text-2xl font-bold tracking-tight text-white">{{xodim.user.first_name}} {{xodim.user.last_name}}</h2>
        <p class="text-sm font-label uppercase tracking-wider text-slate-400">{{xodim.role}} • ID: {{xodim.id}}</p>

      </div>
    </section>
    <!-- Edit Form -->
    <form class="space-y-6" method="post">
      {% csrf_token %}
      <!-- Form Group: Name -->
      <div class="space-y-2">
        <label class="text-[10px] uppercase font-bold tracking-wider text-slate-400 px-1">First Name</label>
        <div class="relative group">
          <span
            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span>
          <input
            class="w-full bg-slate-900/50 inner-shadow-field border-none rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:ring-2 focus:ring-primary transition-all font-medium"
            type="text" value="{{xodim.user.first_name}}" name="first_name" />
        </div>
      </div>
      <div class="space-y-2">
        <label class="text-[10px] uppercase font-bold tracking-wider text-slate-400 px-1">Last Name</label>
        <div class="relative group">
          <span
            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span>
          <input
            class="w-full bg-slate-900/50 inner-shadow-field border-none rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:ring-2 focus:ring-primary transition-all font-medium"
            type="text" value="{{xodim.user.last_name}}" name="last_name" />
        </div>
      </div>
      <!-- Form Group: Role -->
      <div class="space-y-2">
        <label class="text-[10px] uppercase font-bold tracking-wider text-slate-400 px-1">Lavozimi</label>
        <div class="relative group">
          <span
            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">badge</span>
          <select name="role"
            class="w-full bg-slate-900/50 inner-shadow-field border-none rounded-2xl py-4 pl-12 pr-4 text-white appearance-none focus:ring-2 focus:ring-primary transition-all font-medium">
            {% for role in roles %}
            {% if role.name == xodim.role %}
              <option selected="" value="{{role.name}}">{{role.display}}</option>
            {% else %}
              <option value="{{role.name}}">{{role.display}}</option>
            {% endif %}
            {% endfor %}
          </select>
          <span
            class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">expand_more</span>
        </div>
      </div>
      <!-- Form Group: Phone -->
      <div class="space-y-2">
        <label class="text-[10px] uppercase font-bold tracking-wider text-slate-400 px-1">Telefon raqami</label>
        <div class="relative group">
          <span
            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">call</span>
          <input
            class="w-full bg-slate-900/50 inner-shadow-field border-none rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:ring-2 focus:ring-primary transition-all font-medium"
            type="tel" value="{{xodim.user.username}}" name="username"/>
        </div>
      </div>
      <div class="space-y-2">
        <label class="text-[10px] uppercase font-bold tracking-wider text-slate-400 px-1">Password</label>
        <div class="relative group">
          <span
            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">password</span>
          <input
            class="w-full bg-slate-900/50 inner-shadow-field border-none rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:ring-2 focus:ring-primary transition-all font-medium"
            type="password" placeholder="Agar o'zgartirish kerak bo'lsa yozing."  name="password"/>
        </div>
      </div>
      <!-- Action Buttons -->
      <div class="pt-6 space-y-4">
        <button
          class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          type="submit">
          <span class="material-symbols-outlined">save</span>
          O'zgarishlarni saqlash
        </button>
        <button
          class="w-full bg-transparent border-2 border-error/30 text-error hover:bg-error/5 font-bold py-4 rounded-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          type="button">
          <span class="material-symbols-outlined">delete_forever</span>
          <a href="{% url 'xodim_delete_page' xodim_id=xodim.id %}">Delete Employee</a>
        </button>
      </div>
    </form>
  </main>
</body>

</html>
