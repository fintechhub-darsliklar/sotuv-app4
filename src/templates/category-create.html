<!DOCTYPE html>

<html class="dark" lang="uz">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Kategoriya qo'shish</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#0b1018",
                        "inverse-on-surface": "#0f172a",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#d1fae5",
                        "secondary-container": "#10b9811a",
                        "surface": "#101822",
                        "background": "#101822",
                        "tertiary-fixed-dim": "#fde68a",
                        "on-surface-variant": "#94a3b8",
                        "error": "#ef4444",
                        "surface-container-highest": "#334155",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#136dec",
                        "on-secondary-fixed-variant": "#047857",
                        "tertiary-container": "#f59e0b1a",
                        "tertiary-fixed": "#fef3c7",
                        "on-surface": "#f1f5f9",
                        "primary-container": "#136dec",
                        "surface-variant": "#1e293b",
                        "error-container": "#450a0a",
                        "surface-bright": "#1e293b",
                        "on-secondary-container": "#10b981",
                        "on-tertiary-fixed-variant": "#b45309",
                        "primary-fixed": "#dbeafe",
                        "on-secondary-fixed": "#064e3b",
                        "on-primary-container": "#ffffff",
                        "inverse-primary": "#60a5fa",
                        "on-primary-fixed-variant": "#1d4ed8",
                        "secondary": "#10b981",
                        "primary": "#136dec",
                        "surface-container-low": "#1e293b66",
                        "tertiary": "#f59e0b",
                        "surface-container-high": "#1e293b99",
                        "secondary-fixed-dim": "#a7f3d0",
                        "outline": "#334155",
                        "surface-container": "#1e293b80",
                        "on-error-container": "#fecaca",
                        "on-background": "#f1f5f9",
                        "outline-variant": "#475569",
                        "inverse-surface": "#f1f5f9",
                        "primary-fixed-dim": "#bfdbfe",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#78350f",
                        "on-primary-fixed": "#1e3a8a",
                        "surface-dim": "#101822",
                        "on-tertiary-container": "#f59e0b"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #101822;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- Top AppBar -->
    <header
        class="bg-slate-900/80 backdrop-blur-md fixed top-0 z-50 flex items-center justify-between px-6 py-4 w-full shadow-sm">
        <div class="flex items-center gap-4">
            <a href="{% url 'products_page' %}">
            <button
                class="text-blue-600 dark:text-blue-500 hover:bg-slate-800/50 transition-colors p-2 rounded-full active:scale-[0.98] transition-transform">
                <span class="material-symbols-outlined">arrow_back</span>
            </button></a>
            <h1 class="font-manrope font-bold text-lg text-on-surface">Kategoriya qo'shish</h1>
        </div>
        <div class="w-10"></div> <!-- Spacer for balance -->
    </header>
    <form method="post">
        {% csrf_token %}
    <main class="flex-1 mt-20 mb-32 px-6 max-w-2xl mx-auto w-full overflow-y-auto">
        <!-- Preview Card Section -->
        <section class="mb-8">
            <p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-3 px-1">Oldindan ko'rish
            </p>
            <div
                class="bg-surface-container rounded-3xl p-6 border border-slate-800/50 flex items-center gap-6 shadow-sm">
                <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center text-blue-500">
                    <span class="material-symbols-outlined text-4xl"
                        style="font-variation-settings: 'FILL' 1;">restaurant</span>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-on-surface">Masalan: Oziq-ovqat</h3>
                    <p class="text-sm text-on-surface-variant">Yangi yaratiladigan kategoriya ko'rinishi</p>
                </div>
            </div>
        </section>
        
        <!-- Category Name Input -->
        <section class="mb-8">
            <label
                class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-3 block px-1">Kategoriya
                nomi</label>
            <div class="relative group">
                <input
                    class="w-full bg-slate-900/50 border-none rounded-2xl px-5 py-4 text-on-surface placeholder:text-slate-600 focus:ring-2 focus:ring-primary shadow-inner transition-all outline-none"
                    placeholder="Kategoriya nomini kiriting" type="text" name="category_name"/>
            </div>
        </section>

    </main>
    <!-- Bottom Navigation / Save Action -->
    <div class="fixed bottom-0 left-0 w-full z-50">
        <div class="bg-slate-900/90 backdrop-blur-xl px-6 pb-8 pt-4 rounded-t-[24px] border-t border-slate-800/50">
            <button type="submit"
                class="w-full bg-primary text-on-primary font-manrope font-bold py-4 rounded-2xl shadow-primary/30 active:scale-[0.95] transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                Saqlash
            </button>
        </div>
        <!-- BottomNavBar (Hidden in creation flow but kept for shell consistency) -->
        <nav
            class="hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-slate-900/90 backdrop-blur-xl rounded-t-[24px] border-t border-slate-800/50 z-50">
            <div
                class="flex flex-col items-center justify-center text-slate-500 px-4 py-2 hover:text-blue-400 active:scale-[0.95] transition-all">
                <span class="material-symbols-outlined">home</span>
                <span class="font-manrope text-[10px] font-bold uppercase tracking-wider">Asosiy</span>
            </div>
            <div
                class="flex flex-col items-center justify-center bg-blue-600/10 text-blue-500 rounded-2xl px-4 py-2 active:scale-[0.95] transition-all">
                <span class="material-symbols-outlined">category</span>
                <span class="font-manrope text-[10px] font-bold uppercase tracking-wider">Kategoriyalar</span>
            </div>
            <div
                class="flex flex-col items-center justify-center text-slate-500 px-4 py-2 hover:text-blue-400 active:scale-[0.95] transition-all">
                <span class="material-symbols-outlined">bar_chart</span>
                <span class="font-manrope text-[10px] font-bold uppercase tracking-wider">Statistika</span>
            </div>
            <div
                class="flex flex-col items-center justify-center text-slate-500 px-4 py-2 hover:text-blue-400 active:scale-[0.95] transition-all">
                <span class="material-symbols-outlined">settings</span>
                <span class="font-manrope text-[10px] font-bold uppercase tracking-wider">Sozlamalar</span>
            </div>
        </nav>
    </div>
    </form>

</body>

</html>
